services:
  django:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./src:/app/src
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      sandbox-build:
        condition: service_completed_successfully

  sandbox-build:
    image: docker:cli
    command: docker build -t beskar-vault -f /workspace/sandbox/Dockerfile.sandbox /workspace/sandbox
    volumes:
      - ./sandbox:/workspace/sandbox
      - /var/run/docker.sock:/var/run/docker.sock
